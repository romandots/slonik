# slonk — proxy overlay (Phase 7)
#
# Включается через:
#   docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
#
# Делает три вещи:
#   1) Поднимает внешний Caddy на 80/443 хоста как TLS-шлюз.
#   2) Снимает прямую публикацию plane-proxy и mcp-kanban на хост —
#      они становятся доступны только через Caddy (по domain'у).
#   3) Включает том caddy_data для ACME-сертификатов / Caddy internal CA.
#
# С proxy overlay в прод-режиме на хосте торчат только 80/443. БД,
# RabbitMQ, MinIO и Plane API доступны исключительно изнутри internal_net.
#
# Не сочетать с docker-compose.dev.yml в прод-окружении.

services:
  # ---------------------------------------------------------------------------
  # plane-proxy: убираем host-биндинг — теперь front-door это caddy.
  # ---------------------------------------------------------------------------
  plane-proxy:
    ports: !reset []
    expose:
      - "80"

  # ---------------------------------------------------------------------------
  # mcp-kanban: убираем host-биндинг — доступ только через caddy.
  # ---------------------------------------------------------------------------
  mcp-kanban:
    ports: !reset []
    expose:
      - "${MCP_SERVER_PORT}"

  # ---------------------------------------------------------------------------
  # caddy: внешний TLS-шлюз. Конфиг — caddy/Caddyfile. Сертификаты живут в
  # томе caddy_data (на on-prem — Caddy internal CA; в prod — Let's Encrypt).
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-plane.localhost}
      CADDY_MCP_DOMAIN: ${CADDY_MCP_DOMAIN:-mcp.localhost}
      CADDY_TLS_MODE: ${CADDY_TLS_MODE:-internal}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-}
      MCP_SERVER_PORT: ${MCP_SERVER_PORT}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      plane-proxy:
        condition: service_healthy
      mcp-kanban:
        condition: service_healthy
    networks:
      - public_net
      - internal_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Caddy 2 не имеет своего /healthz; шлём HEAD на 127.0.0.1:80 —
      # отдаст redirect-to-HTTPS (308), что всё равно «alive».
      test: ["CMD-SHELL", "wget -q -O- --spider http://127.0.0.1/ 2>&1 | grep -qE 'HTTP/1.1 (200|301|308)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy_data:
    name: slonk_caddy_data
  caddy_config:
    name: slonk_caddy_config
