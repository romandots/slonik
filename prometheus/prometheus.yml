# Prometheus конфиг для slonk-observability (Phase 8).
#
# Скрейпит только mcp-kanban (его /metrics). Plane v1.3.0 не отдаёт
# Prometheus-метрик; на нём ездим через Loki + лог-парсинг.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: mcp-kanban
    scrape_interval: 10s
    scheme: http
    static_configs:
      - targets: [mcp-kanban:8787]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: mcp-kanban

  - job_name: prometheus-self
    static_configs:
      - targets: [localhost:9090]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
