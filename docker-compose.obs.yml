# slonk — observability overlay (Phase 8)
#
# Включается через:
#   docker compose -f docker-compose.yml -f docker-compose.obs.yml up -d
#
# Поднимает Prometheus + Grafana + Loki + Promtail. Конфиги — в каталогах
# prometheus/, grafana/, loki/, promtail/.
#
# Доступ:
#   - Grafana:    http://localhost:${GRAFANA_HOST_PORT:-3001} (login: $GRAFANA_ADMIN_USER / $GRAFANA_ADMIN_PASSWORD)
#   - Prometheus: http://localhost:${PROMETHEUS_HOST_PORT:-9090} (без auth)
#
# В прод-режиме поверх Grafana обычно встаёт reverse proxy с auth — для v1
# мы не добавляем его поверх observability-стека, оставляя пользователю.

services:
  # ---------------------------------------------------------------------------
  # mcp-kanban: включаем экспозицию /metrics через env.
  # ---------------------------------------------------------------------------
  mcp-kanban:
    environment:
      MCP_METRICS_ENABLED: "1"

  # ---------------------------------------------------------------------------
  # prometheus: scrape mcp-kanban + self.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - internal_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # loki: лог-агрегатор.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    environment:
      LOKI_RETENTION: ${LOKI_RETENTION:-168h}
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - internal_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3100/ready 2>/dev/null | grep -q ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # promtail: тейлит docker-логи на хосте, отправляет в Loki.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # grafana: UI + provisioned datasources + dashboard.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - internal_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  prometheus_data:
    name: slonk_prometheus_data
  loki_data:
    name: slonk_loki_data
  promtail_positions:
    name: slonk_promtail_positions
  grafana_data:
    name: slonk_grafana_data
