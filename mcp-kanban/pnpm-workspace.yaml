allowBuilds:
  better-sqlite3: true
  esbuild: true
# pnpm 11 — конфиг рабочей области.
#
# `onlyBuiltDependencies` объявляет белый список пакетов, чьи postinstall
# скрипты разрешено выполнять (политика по умолчанию pnpm 10+/11 —
# запретить все). В pnpm 11 блок `pnpm.onlyBuiltDependencies` из
# package.json не считывается для standalone-проектов; нужен этот файл.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
